<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPUREDIS 控制面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.25); }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .card-hover { transition: all 0.2s ease; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-200">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-white"><i class="fas fa-microchip mr-2 text-indigo-400"></i>GPUREDIS</h1>
            <div id="conn-status" class="px-4 py-1.5 rounded-full text-sm font-medium"></div>
        </div>

        <!-- GPU 设备管理 -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-white"><i class="fas fa-server mr-2 text-green-400"></i>显卡设备</h2>
                <div class="flex space-x-2">
                    <button onclick="syncAgent()" class="px-4 py-2 bg-slate-700 text-gray-300 rounded-lg hover:bg-slate-600 transition text-sm font-medium">
                        <i class="fas fa-sync-alt mr-1"></i>手动同步
                    </button>
                    <button onclick="openGpuModal()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm font-medium">
                        <i class="fas fa-plus mr-1"></i>添加显卡
                    </button>
                </div>
            </div>
            <div id="gpu-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="text-gray-500 text-center py-8">加载中...</div>
            </div>
        </div>

        <!-- 渠道管理 -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-white"><i class="fas fa-plug mr-2 text-indigo-400"></i>渠道配置</h2>
                <button onclick="openChannelModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition text-sm font-medium">
                    <i class="fas fa-plus mr-1"></i>添加渠道
                </button>
            </div>
            <div id="channel-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="text-gray-500 text-center py-8">加载中...</div>
            </div>
        </div>

        <!-- 任务监控 -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-6">
                <div class="flex space-x-2 p-1 bg-slate-800 rounded-xl">
                    <button id="tab-active" onclick="switchTab('active')" class="px-6 py-2 rounded-lg text-sm font-bold transition-all bg-indigo-600 text-white shadow-lg">活跃任务</button>
                    <button id="tab-history" onclick="switchTab('history')" class="px-6 py-2 rounded-lg text-sm font-bold transition-all text-gray-400 hover:text-white">历史记录</button>
                </div>
                <button id="btn-clear-history" onclick="clearHistory()" class="hidden px-4 py-2 bg-red-600/20 text-red-400 border border-red-500/30 rounded-lg hover:bg-red-600/30 transition text-sm">
                    <i class="fas fa-trash-alt mr-1"></i>清空历史
                </button>
            </div>
            <div id="queue-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 任务卡片由 JS 填充 -->
            </div>
        </div>
    </div>

    <!-- 添加显卡 Modal -->
    <div id="gpu-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-md rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
            <div class="p-6">
                <h3 class="text-xl font-bold text-white mb-6">添加显卡设备</h3>
                <form id="gpu-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">显卡名称 (如 RTX 4090)</label>
                        <input type="text" id="gpu-name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">总显存 (GB)</label>
                            <input type="number" id="gpu-vram" step="0.1" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">总内存 (GB)</label>
                            <input type="number" id="gpu-ram" step="0.1" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">所在主机地址</label>
                        <input type="text" id="gpu-host" value="localhost" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                    </div>
                    <div class="flex justify-end space-x-3 mt-8">
                        <button type="button" onclick="closeGpuModal()" class="px-6 py-2 text-gray-400 hover:text-white transition">取消</button>
                        <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-bold">提交保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 添加/编辑渠道 Modal -->
    <div id="channel-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-lg rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
            <div class="p-6">
                <h3 id="channel-modal-title" class="text-xl font-bold text-white mb-6">渠道配置</h3>
                <form id="channel-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">渠道名称</label>
                            <input type="text" id="ch-name" required placeholder="如: Whisper-高速" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">绑定显存 (GB)</label>
                            <input type="number" id="ch-vram" step="0.1" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">绑定显卡设备</label>
                            <select id="ch-gpu" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                                <option value="">-- 选择显卡 --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">调度权重 (1-100)</label>
                            <input type="number" id="ch-weight" value="10" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">服务类型 (service_type)</label>
                        <input type="text" id="ch-type" required placeholder="如: whisper" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">执行模式</label>
                        <select id="ch-mode" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                            <option value="sync">同步请求 (Sync)</option>
                            <option value="async">异步轮询 (Async)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">服务提交地址 (URL)</label>
                        <input type="url" id="ch-url" required placeholder="http://127.0.0.1:5000/predict" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">异步查询地址 (可选)</label>
                        <input type="text" id="ch-query-url" placeholder="/check_status/{job_id}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white outline-none">
                    </div>
                    <div class="hidden">
                        <input type="number" id="ch-ram" value="0">
                    </div>
                    <div class="flex justify-end space-x-3 mt-8">
                        <button type="button" onclick="closeChannelModal()" class="px-6 py-2 text-gray-400 hover:text-white transition">取消</button>
                        <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-bold">保存配置</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 right-8 z-[100] transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-indigo-600 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center">
            <i class="fas fa-info-circle mr-2"></i>
            <span id="toast-msg"></span>
        </div>
    </div>

    <script>
        let activeTab = 'active';
        let currentEditChannelId = null;
        let pollingTimer = null;
        let hasActiveTasks = false;

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        // ===== 数据加载 =====
        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const el = document.getElementById('conn-status');
                if (data.redis_connected) {
                    el.innerText = "已连接 Redis";
                    el.className = "px-4 py-1.5 rounded-full text-sm font-medium bg-green-500/10 text-green-400 border border-green-500/20";
                } else {
                    el.innerText = "Redis 连接断开";
                    el.className = "px-4 py-1.5 rounded-full text-sm font-medium bg-red-500/10 text-red-400 border border-red-500/20";
                }
            } catch(e) { }
        }

        async function loadGpus() {
            try {
                const res = await fetch('/api/gpus');
                const data = await res.json();
                const list = document.getElementById('gpu-list');
                const select = document.getElementById('ch-gpu');
                
                list.innerHTML = '';
                // 清空下拉框，保留第一个默认选项
                select.innerHTML = '<option value="">-- 选择显卡 --</option>';

                data.gpus.forEach(gpu => {
                    const card = document.createElement('div');
                    card.className = "glass p-5 rounded-2xl border border-white/5 card-hover relative group";
                    card.innerHTML = `
                        <button onclick="deleteGpu('${gpu.id}')" class="absolute top-4 right-4 text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="flex items-center mb-4">
                            <div class="w-10 h-10 rounded-xl bg-green-500/10 flex items-center justify-center text-green-400 mr-3">
                                <i class="fas fa-microchip"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-white">${gpu.name}</h3>
                                <p class="text-xs text-gray-500">ID: ${gpu.id} | ${gpu.host}</p>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-400">显存总量</span>
                                <span class="text-gray-200 font-mono">${gpu.total_vram} GB</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-400">系统内存</span>
                                <span class="text-gray-200 font-mono">${gpu.total_ram} GB</span>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);

                    const opt = document.createElement('option');
                    opt.value = gpu.id;
                    opt.innerText = `${gpu.name} (${gpu.id})`;
                    select.appendChild(opt);
                });
            } catch(e) { }
        }

        async function loadChannels() {
            try {
                const res = await fetch('/api/channels');
                const data = await res.json();
                const list = document.getElementById('channel-list');
                list.innerHTML = '';
                data.channels.forEach(ch => {
                    const card = document.createElement('div');
                    card.className = "glass p-5 rounded-2xl border border-white/5 card-hover relative group";
                    card.innerHTML = `
                        <div class="absolute top-4 right-4 flex space-x-2 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="editChannel('${ch.id}')" class="text-gray-500 hover:text-indigo-400"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteChannel('${ch.id}')" class="text-gray-500 hover:text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="flex items-center mb-4">
                            <div class="w-10 h-10 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 mr-3">
                                <i class="fas fa-plug"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-white">${ch.name}</h3>
                                <p class="text-xs text-gray-500">类型: ${ch.service_type} | 权重: ${ch.weight}</p>
                            </div>
                        </div>
                        <div class="space-y-1 mb-4">
                            <p class="text-xs text-gray-400 truncate"><i class="fas fa-link mr-1"></i>${ch.service_url}</p>
                            <p class="text-xs text-gray-400"><i class="fas fa-microchip mr-1"></i>绑定设备: ${ch.gpu_id}</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="px-2 py-0.5 rounded bg-indigo-500/10 text-indigo-400 text-[10px] font-bold uppercase">${ch.execution_mode}</span>
                            <span class="px-2 py-0.5 rounded bg-green-500/10 text-green-400 text-[10px] font-bold uppercase">${ch.base_vram}GB VRAM</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch(e) { }
        }

        async function loadQueue() {
            try {
                const res = await fetch('/api/queue');
                const data = await res.json();
                let tasks = data.tasks || [];
                
                // 检查是否有活跃任务，用于智能调度轮询
                hasActiveTasks = tasks.some(t => ['pending', 'running'].includes(t.status));
                resetPolling();

                if (activeTab === 'active') {
                    tasks = tasks.filter(t => ['pending', 'running', 'waiting'].includes(t.status));
                } else {
                    tasks = tasks.filter(t => ['completed', 'failed', 'cancelled'].includes(t.status));
                }

                const el = document.getElementById('queue-list');
                if (tasks.length === 0) {
                    el.innerHTML = `<div class="col-span-1 md:col-span-2 lg:col-span-3 text-center text-gray-500 py-12 glass rounded-2xl"><i class="fas fa-${activeTab === 'active' ? 'check-circle' : 'history'} text-4xl mb-3 block text-gray-600"></i>当前${activeTab === 'active' ? '没有运行中的任务' : '暂无历史记录'}</div>`;
                    return;
                }

                el.innerHTML = '';
                tasks.forEach(t => {
                    const card = document.createElement('div');
                    card.className = "glass p-5 rounded-2xl border border-white/5 hover:border-indigo-500/30 transition-all";
                    
                    let statusClass = "text-yellow-400";
                    let statusIcon = "fa-clock";
                    if(t.status === 'running') { statusClass = "text-blue-400 animate-pulse"; statusIcon = "fa-spinner fa-spin"; }
                    if(t.status === 'completed') { statusClass = "text-green-400"; statusIcon = "fa-check-circle"; }
                    if(t.status === 'failed') { statusClass = "text-red-400"; statusIcon = "fa-exclamation-circle"; }

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div class="text-xs font-bold uppercase tracking-wider text-gray-500">${t.service_type}</div>
                            <div class="flex items-center text-xs font-bold ${statusClass}">
                                <i class="fas ${statusIcon} mr-1"></i>${t.status.toUpperCase()}
                            </div>
                        </div>
                        <div class="text-sm text-white font-mono mb-4 truncate">#${t.id.substring(0,8)}</div>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] text-gray-500">${new Date(t.created_at * 1000).toLocaleString()}</span>
                            <div class="flex space-x-2">
                                ${['pending', 'waiting'].includes(t.status) ? `<button onclick="cancelTask('${t.id}')" class="text-gray-400 hover:text-red-400 text-xs"><i class="fas fa-times-circle mr-1"></i>取消</button>` : ''}
                                <button onclick="deleteTaskRecord('${t.id}')" class="text-gray-400 hover:text-white text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                    el.appendChild(card);
                });
            } catch(e) { }
        }

        function resetPolling() {
            if (pollingTimer) clearInterval(pollingTimer);
            // 智能轮询：如果有任务，3秒刷新一次；如果没有任务，10秒刷新一次
            const interval = hasActiveTasks ? 3000 : 10000;
            pollingTimer = setInterval(() => {
                if (activeTab === 'active') loadQueue();
            }, interval);
        }

        // ===== 弹窗控制 =====
        function openGpuModal() { document.getElementById('gpu-modal').classList.remove('hidden'); }
        function closeGpuModal() { 
            document.getElementById('gpu-modal').classList.add('hidden'); 
            document.getElementById('gpu-form').reset();
        }

        function openChannelModal() { 
            document.getElementById('channel-modal-title').innerText = "配置新渠道";
            currentEditChannelId = null;
            document.getElementById('channel-modal').classList.remove('hidden'); 
        }

        async function editChannel(id) {
            try {
                const res = await fetch('/api/channels');
                const data = await res.json();
                const ch = data.channels.find(c => c.id === id);
                if (ch) {
                    currentEditChannelId = id;
                    document.getElementById('channel-modal-title').innerText = "修改渠道: " + ch.name;
                    document.getElementById('ch-name').value = ch.name;
                    document.getElementById('ch-gpu').value = ch.gpu_id;
                    document.getElementById('ch-type').value = ch.service_type;
                    document.getElementById('ch-url').value = ch.service_url;
                    document.getElementById('ch-query-url').value = ch.query_url || '';
                    document.getElementById('ch-mode').value = ch.execution_mode;
                    document.getElementById('ch-vram').value = ch.base_vram;
                    document.getElementById('ch-weight').value = ch.weight;
                    document.getElementById('channel-modal').classList.remove('hidden');
                }
            } catch(e) { showToast("获取详情失败"); }
        }

        function closeChannelModal() { 
            document.getElementById('channel-modal').classList.add('hidden'); 
            document.getElementById('channel-form').reset();
            currentEditChannelId = null;
        }

        // ===== 表单提交 =====
        document.getElementById('gpu-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('gpu-name').value,
                total_vram: parseFloat(document.getElementById('gpu-vram').value),
                total_ram: parseFloat(document.getElementById('gpu-ram').value),
                host: document.getElementById('gpu-host').value,
            };
            try {
                const res = await fetch('/api/gpus', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    showToast("显卡已添加，系统将自动绑定");
                    closeGpuModal();
                    await loadAll();
                }
            } catch(e) { showToast("请求失败"); }
        };

        document.getElementById('channel-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('ch-name').value,
                gpu_id: document.getElementById('ch-gpu').value,
                service_type: document.getElementById('ch-type').value,
                service_url: document.getElementById('ch-url').value,
                query_url: document.getElementById('ch-query-url').value,
                execution_mode: document.getElementById('ch-mode').value,
                base_vram: parseFloat(document.getElementById('ch-vram').value),
                base_ram: parseFloat(document.getElementById('ch-ram').value),
                weight: parseInt(document.getElementById('ch-weight').value),
            };
            try {
                const url = currentEditChannelId ? `/api/channels/${currentEditChannelId}` : '/api/channels';
                const method = currentEditChannelId ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    showToast(currentEditChannelId ? "渠道更新成功" : "渠道添加成功");
                    closeChannelModal();
                    await loadAll();
                }
            } catch(e) { showToast("请求失败"); }
        };

        // ===== 任务操作 =====
        function switchTab(tab) {
            activeTab = tab;
            const activeEl = document.getElementById('tab-active');
            const historyEl = document.getElementById('tab-history');
            const clearBtn = document.getElementById('btn-clear-history');
            
            if (tab === 'active') {
                activeEl.className = 'px-6 py-2 rounded-lg text-sm font-bold transition-all bg-indigo-600 text-white shadow-lg';
                historyEl.className = 'px-6 py-2 rounded-lg text-sm font-bold transition-all text-gray-400 hover:text-white';
                clearBtn.classList.add('hidden');
            } else {
                historyEl.className = 'px-6 py-2 rounded-lg text-sm font-bold transition-all bg-indigo-600 text-white shadow-lg';
                activeEl.className = 'px-6 py-2 rounded-lg text-sm font-bold transition-all text-gray-400 hover:text-white';
                clearBtn.classList.remove('hidden');
            }
            loadQueue();
        }

        async function deleteTaskRecord(taskId) {
            if(!confirm('确定删除记录吗？')) return;
            try {
                const res = await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
                if (res.ok) { showToast("记录已删除"); await loadQueue(); }
            } catch(e) { }
        }

        async function clearHistory() {
            if(!confirm('确定清空历史吗？')) return;
            try {
                const res = await fetch('/api/tasks/history/clear', { method: 'DELETE' });
                const data = await res.json();
                showToast(`已清空 ${data.deleted_count} 条记录`);
                await loadQueue();
            } catch(e) { }
        }

        async function cancelTask(taskId) {
            if(!confirm('确认取消？')) return;
            try {
                const res = await fetch(`/api/tasks/${taskId}/cancel`, { method: 'DELETE' });
                if (res.ok) { showToast("已取消"); await loadQueue(); }
            } catch(e) { }
        }

        async function deleteGpu(id) {
            if (!confirm('确认删除？')) return;
            try {
                const res = await fetch(`/api/gpus/${id}`, { method: 'DELETE' });
                if (res.ok) { showToast("已删除"); await loadAll(); }
            } catch(e) { }
        }

        async function deleteChannel(id) {
            if (!confirm('确认删除？')) return;
            try {
                const res = await fetch(`/api/channels/${id}`, { method: 'DELETE' });
                if (res.ok) { showToast("已删除"); await loadAll(); }
            } catch(e) { }
        }

        async function syncAgent() {
            try {
                const res = await fetch('/api/agent/sync', { method: 'POST' });
                if (res.ok) {
                    showToast("同步请求已发送，显卡正在重新绑定...");
                    setTimeout(() => loadAll(), 1000);
                }
            } catch(e) { showToast("同步失败"); }
        }

        async function loadAll() {
            await Promise.all([loadGpus(), loadChannels(), loadQueue(), loadStatus()]);
        }

        // ===== 初始化 =====
        loadAll();
        setInterval(loadStatus, 10000); // 状态栏 10秒检查一次
        resetPolling();
    </script>
</body>
</html>
